<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alves Racing — Veículos</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050510;--bg2:#080816;--panel:#0d0b1a;--card:#11101f;--card2:#17132a;
      --purple:#7c3aed;--purple2:#a855f7;--purple3:#c084fc;--border:rgba(168,85,247,.20);
      --text:#fff;--muted:#9ca0b5;--green:#00d26a;--danger:#ef4444;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,'Segoe UI',Roboto,Arial,sans-serif;color:var(--text)}
    #overlay{display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:rgba(0,0,0,.38);z-index:10}
    .dash{width:1220px;max-width:94vw;height:780px;max-height:92vh;border-radius:28px;overflow:hidden;background:
      radial-gradient(circle at 18% 0%,rgba(124,58,237,.30),transparent 34%),
      radial-gradient(circle at 100% 20%,rgba(168,85,247,.16),transparent 30%),
      linear-gradient(180deg,#080816,#050510 70%);border:1px solid var(--border);box-shadow:0 28px 90px rgba(0,0,0,.62),0 0 45px rgba(124,58,237,.20);padding:26px;display:flex;flex-direction:column;gap:20px}
    .top{display:flex;align-items:center;gap:16px}.icon{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 12px 30px rgba(124,58,237,.42)}
    .titlebox{flex:1}.title{font-size:30px;font-weight:950;letter-spacing:-.04em}.sub{font-size:14px;color:var(--muted);margin-top:4px}.server-pill{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08);font-size:13px;color:var(--muted);font-weight:800}.dot{width:9px;height:9px;border-radius:999px;background:var(--green);box-shadow:0 0 14px var(--green)}
    .close{width:46px;height:46px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);color:#d9d6ff;font-size:22px;cursor:pointer;transition:.16s}.close:hover{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.42);color:#fff}
    .toolbar{display:flex;align-items:center;gap:12px}.search-wrap{position:relative;flex:1}.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:#bda8ff}.search{width:100%;height:52px;border-radius:18px;border:1px solid rgba(168,85,247,.38);background:rgba(13,11,26,.82);box-shadow:inset 0 0 18px rgba(124,58,237,.08),0 0 18px rgba(124,58,237,.08);padding:0 18px 0 48px;color:#fff;font-size:15px;outline:none}.search:focus{border-color:var(--purple2);box-shadow:0 0 26px rgba(168,85,247,.18)}
    .select,.view{height:52px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);color:#d7d3ff;font-weight:850;padding:0 16px}.view{width:52px;font-size:19px}.view.active{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border-color:transparent;box-shadow:0 10px 26px rgba(124,58,237,.32)}
    .grid{flex:1;min-height:0;overflow-y:auto;padding-right:8px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;align-content:start}.grid::-webkit-scrollbar{width:5px}.grid::-webkit-scrollbar-thumb{background:rgba(168,85,247,.32);border-radius:999px}
    .card{position:relative;min-height:222px;border-radius:24px;padding:16px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.025)),radial-gradient(circle at 50% 8%,rgba(168,85,247,.22),transparent 42%),var(--card);border:1px solid rgba(168,85,247,.17);box-shadow:inset 0 0 24px rgba(124,58,237,.045);display:flex;flex-direction:column;transition:.16s}.card:hover{transform:translateY(-2px);border-color:rgba(168,85,247,.55);box-shadow:0 18px 38px rgba(0,0,0,.24),0 0 30px rgba(124,58,237,.13)}
    .car-img{height:92px;border-radius:18px;background:radial-gradient(circle,rgba(168,85,247,.28),rgba(255,255,255,.035) 62%,rgba(255,255,255,.02));display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:14px}.car-img img{max-width:115%;height:100%;object-fit:cover;filter:drop-shadow(0 14px 18px rgba(0,0,0,.55))}.fallback-car{font-size:42px;opacity:.85}
    .name{font-size:16px;font-weight:950;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase}.meta{display:flex;align-items:center;gap:8px;margin-top:9px;color:var(--muted);font-size:13px;font-weight:800}.badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:10px;background:rgba(168,85,247,.22);border:1px solid rgba(168,85,247,.32);color:#e9d5ff;font-weight:950}.spawn{margin-top:auto;height:42px;border:0;border-radius:15px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-weight:950;font-size:13px;cursor:pointer;box-shadow:0 12px 26px rgba(124,58,237,.30);transition:.13s}.spawn:hover{filter:brightness(1.12)}.spawn:active{transform:scale(.97)}
    .footer{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);font-size:13px}.pages{display:flex;gap:8px}.page{min-width:36px;height:36px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.045);color:#d7d3ff;font-weight:900;cursor:pointer}.page.active{background:linear-gradient(135deg,var(--purple),var(--purple2));border-color:transparent;color:#fff}.page:disabled{opacity:.35;cursor:not-allowed}.empty{grid-column:1/-1;align-self:center;justify-self:center;color:var(--muted);font-size:16px;padding:80px}.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(40px);opacity:0;pointer-events:none;padding:12px 20px;border-radius:15px;background:rgba(13,11,26,.92);border:1px solid var(--border);box-shadow:0 18px 40px rgba(0,0,0,.35);font-weight:850;transition:.18s;z-index:20}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{color:var(--green)}.toast.error{color:var(--danger)}.toast.info{color:var(--purple3)}
    @media(max-width:1050px){.grid{grid-template-columns:repeat(3,1fr)}.dash{width:980px}}@media(max-width:780px){.grid{grid-template-columns:repeat(2,1fr)}.server-pill,.select,.view{display:none}}
  </style>
</head>
<body>
<div id="overlay"><div class="dash">
  <div class="top"><div class="icon">🏎️</div><div class="titlebox"><div class="title">Veículos</div><div class="sub">Escolha seu veículo e entre em ação.</div></div><div class="server-pill"><span class="dot"></span><span>Servidor: JFx Classe S</span></div><button class="close" id="btn-close">↗</button></div>
  <div class="toolbar"><div class="search-wrap"><span class="search-icon">⌕</span><input class="search" id="search-input" type="text" placeholder="Buscar veículo..." autocomplete="off"></div><button class="select" id="save-preset-btn">Salvar visual atual</button><button class="select" id="sort-btn">Ordenar: A - Z</button><button class="view active">▦</button><button class="view">☰</button></div>
  <div class="grid" id="grid"></div>
  <div class="footer"><div class="pages" id="pages"></div><div id="range-label">Mostrando 0 veículos</div></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
  const state={vehicles:[],search:'',page:1,perPage:12,sortAsc:true};
  function hexToRgb(hex){const clean=String(hex||'').replace('#','').trim();if(clean.length!==6)return null;const v=parseInt(clean,16);if(Number.isNaN(v))return null;return{r:(v>>16)&255,g:(v>>8)&255,b:v&255}}
  function mixHex(hex,target,amount){const rgb=hexToRgb(hex);if(!rgb)return hex;const t=target==='dark'?0:255;const mix=c=>Math.round(c+(t-c)*amount).toString(16).padStart(2,'0');return '#'+mix(rgb.r)+mix(rgb.g)+mix(rgb.b)}
  function applyTheme(theme){const primary=(theme&&theme.primary)||'#8b5cf6';const root=document.documentElement;root.style.setProperty('--purple',primary);root.style.setProperty('--purple2',mixHex(primary,'light',.18));root.style.setProperty('--purple3',mixHex(primary,'light',.35));if(theme&&theme.background){root.style.setProperty('--bg',theme.background);}}
  window.addEventListener('message',ev=>{const msg=ev.data||{};if(msg.action==='open'){applyTheme(msg.data&&msg.data.theme);state.vehicles=(msg.data&&msg.data.vehicles)||[];state.search='';state.page=1;document.getElementById('search-input').value='';document.getElementById('overlay').style.display='flex';render();} if(msg.action==='close')closeOverlay(); if(msg.action==='spawnOk')showToast('✅ '+((msg.data&&msg.data.name)||'Veículo')+' spawnado!','success'); if(msg.action==='spawnFail')showToast('❌ Falha ao spawnar o veículo','error'); if(msg.action==='presetOk')showToast('✅ Preset visual salvo para '+((msg.data&&msg.data.name)||'o veículo'),'success'); if(msg.action==='presetFail')showToast('❌ '+((msg.data&&msg.data.message)||'Falha ao salvar preset'),'error');});
  function nui(action,data){fetch('https://cw-vehicledash/'+action,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data||{})}).catch(()=>{});}
  function filtered(){let q=state.search.toLowerCase();let list=state.vehicles.filter(v=>!q||v.name.toLowerCase().includes(q)||v.modelName.toLowerCase().includes(q));return list.sort((a,b)=>state.sortAsc?a.name.localeCompare(b.name):b.name.localeCompare(a.name));}
  function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
  function render(){const list=filtered();const pages=Math.max(1,Math.ceil(list.length/state.perPage));if(state.page>pages)state.page=pages;const start=(state.page-1)*state.perPage;const pageItems=list.slice(start,start+state.perPage);const grid=document.getElementById('grid');grid.innerHTML='';if(!pageItems.length){grid.innerHTML='<div class="empty">Nenhum veículo encontrado</div>';}pageItems.forEach(v=>{const card=document.createElement('div');card.className='card';card.innerHTML='<div class="car-img"><img src="https://docs.fivem.net/vehicles/'+v.modelName.toLowerCase()+'.webp" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'fallback-car\',textContent:\'🏎️\'}))"></div><div class="name">'+v.name+'</div><div class="meta"><span class="badge">S</span><span>Super</span></div><button class="spawn">🚀 Spawnar</button>';card.querySelector('.spawn').onclick=()=>{nui('spawnVehicle',{modelName:v.modelName,name:v.name});showToast('Spawnando '+v.name+'...','info')};grid.appendChild(card);});renderPages(pages);const end=Math.min(start+pageItems.length,list.length);document.getElementById('range-label').textContent=list.length?'Mostrando '+(start+1)+' a '+end+' de '+list.length+' veículos':'Mostrando 0 veículos';}
  function renderPages(pages){const el=document.getElementById('pages');el.innerHTML='';const add=(txt,fn,cls,dis)=>{const b=document.createElement('button');b.className='page '+(cls||'');b.textContent=txt;b.disabled=!!dis;b.onclick=fn;el.appendChild(b)};add('‹',()=>{state.page--;render()},'',state.page<=1);for(let i=1;i<=pages;i++){if(i>5&&i<pages&&Math.abs(i-state.page)>1){if(i===6)add('…',()=>{},'',true);continue;}add(String(i),()=>{state.page=i;render()},i===state.page?'active':'');}add('›',()=>{state.page++;render()},'',state.page>=pages);}
  document.getElementById('search-input').oninput=e=>{state.search=e.target.value.trim();state.page=1;render()};document.getElementById('save-preset-btn').onclick=()=>{nui('savePreset',{});showToast('Salvando visual do carro atual...','info')};document.getElementById('sort-btn').onclick=()=>{state.sortAsc=!state.sortAsc;document.getElementById('sort-btn').textContent='Ordenar: '+(state.sortAsc?'A - Z':'Z - A');render()};document.getElementById('btn-close').onclick=closeUI;document.addEventListener('keydown',e=>{if(e.key==='Escape')closeUI()});function closeOverlay(){document.getElementById('overlay').style.display='none'}function closeUI(){closeOverlay();nui('closeUI',{})}
  let toastTimer;function showToast(msg,type,dur){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show '+(type||'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.className='toast',dur||3000)}
</script>
</body>
</html>
